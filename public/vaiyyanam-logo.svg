<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7B3FF2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A1A5C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer decorative circle -->
  <circle cx="200" cy="200" r="195" fill="url(#purpleGrad)" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- Inner decorative circle -->
  <circle cx="200" cy="200" r="185" fill="#5C2E7E" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Side decorative scrolls -->
  <path d="M 30 100 Q 25 120 30 140 Q 35 160 30 180" stroke="#D4AF37" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M 370 100 Q 375 120 370 140 Q 365 160 370 180" stroke="#D4AF37" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M 30 220 Q 25 240 30 260 Q 35 280 30 300" stroke="#D4AF37" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M 370 220 Q 375 240 370 260 Q 365 280 370 300" stroke="#D4AF37" stroke-width="2.5" fill="none" opacity="0.8"/>
  
  <!-- Mandala background circles -->
  <circle cx="200" cy="200" r="130" fill="#5C2E7E" opacity="0.6"/>
  <circle cx="200" cy="200" r="125" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="200" r="115" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
  
  <!-- Radial lines for mandala effect -->
  <g stroke="#D4AF37" stroke-width="0.8" opacity="0.5">
    <line x1="200" y1="65" x2="200" y2="335"/>
    <line x1="65" y1="200" x2="335" y2="200"/>
    <line x1="100" y1="100" x2="300" y2="300"/>
    <line x1="300" y1="100" x2="100" y2="300"/>
    <line x1="140" y1="80" x2="260" y2="320"/>
    <line x1="80" y1="140" x2="320" y2="260"/>
    <line x1="260" y1="80" x2="140" y2="320"/>
    <line x1="320" y1="140" x2="80" y2="260"/>
  </g>
  
  <!-- Ganesha figure -->
  <!-- Head -->
  <ellipse cx="200" cy="150" rx="48" ry="52" fill="#F4D03F" stroke="#D4AF37" stroke-width="1.5"/>
  
  <!-- Ears -->
  <ellipse cx="158" cy="125" rx="28" ry="38" fill="#F4D03F" stroke="#D4AF37" stroke-width="1"/>
  <ellipse cx="242" cy="125" rx="28" ry="38" fill="#F4D03F" stroke="#D4AF37" stroke-width="1"/>
  <ellipse cx="158" cy="130" rx="16" ry="28" fill="#D4AF37"/>
  <ellipse cx="242" cy="130" rx="16" ry="28" fill="#D4AF37"/>
  
  <!-- Trunk (curved elephant trunk) -->
  <path d="M 200 195 Q 185 215 178 240 Q 175 250 175 260 Q 175 268 183 270 Q 200 272 217 270 Q 225 268 225 260 Q 225 250 222 240 Q 215 215 200 195" fill="#F4D03F" stroke="#D4AF37" stroke-width="1"/>
  
  <!-- Trunk curves/details -->
  <path d="M 178 240 Q 180 250 183 260" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 222 240 Q 220 250 217 260" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Eyes -->
  <circle cx="183" cy="140" r="7" fill="#2C1B47"/>
  <circle cx="217" cy="140" r="7" fill="#2C1B47"/>
  <circle cx="186" cy="137" r="2.5" fill="#FFFFFF"/>
  <circle cx="220" cy="137" r="2.5" fill="#FFFFFF"/>
  
  <!-- Forehead mark (Tilaka) -->
  <path d="M 200 120 L 200 105" stroke="#C41E3A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="200" cy="115" r="3" fill="#C41E3A"/>
  <line x1="195" y1="115" x2="205" y2="115" stroke="#C41E3A" stroke-width="1.5"/>
  
  <!-- Crown/Headdress -->
  <path d="M 160 108 Q 180 78 200 68 Q 220 78 240 108 L 235 115 Q 220 95 200 85 Q 180 95 165 115 Z" fill="#D4AF37" stroke="#B8932D" stroke-width="1.5"/>
  
  <!-- Crown center jewel -->
  <circle cx="200" cy="85" r="5" fill="#E81828" stroke="#B8932D" stroke-width="0.5"/>
  
  <!-- Crown side jewels -->
  <circle cx="180" cy="95" r="3.5" fill="#E81828"/>
  <circle cx="220" cy="95" r="3.5" fill="#E81828"/>
  <circle cx="168" cy="110" r="2.5" fill="#E81828" opacity="0.8"/>
  <circle cx="232" cy="110" r="2.5" fill="#E81828" opacity="0.8"/>
  
  <!-- Neck ornament (Mala) -->
  <ellipse cx="200" cy="197" rx="52" ry="10" fill="#D4AF37" stroke="#B8932D" stroke-width="1.5"/>
  <ellipse cx="200" cy="195" rx="50" ry="8" fill="#F4D03F"/>
  
  <!-- Beads on mala -->
  <circle cx="175" cy="195" r="2.5" fill="#E81828"/>
  <circle cx="190" cy="195" r="2.5" fill="#E81828"/>
  <circle cx="210" cy="195" r="2.5" fill="#E81828"/>
  <circle cx="225" cy="195" r="2.5" fill="#E81828"/>
  
  <!-- Chest/Body cloth -->
  <path d="M 160 210 L 155 265 Q 155 275 165 278 L 235 278 Q 245 275 245 265 L 240 210 Z" fill="#C41E3A" stroke="#A01630" stroke-width="1.5"/>
  <path d="M 165 215 L 160 265 Q 160 273 168 275 L 232 275 Q 240 273 240 265 L 235 215 Z" fill="#E81828"/>
  
  <!-- Cloth pattern (dots) -->
  <circle cx="175" cy="235" r="2.5" fill="#D4AF37" opacity="0.9"/>
  <circle cx="200" cy="235" r="2.5" fill="#D4AF37" opacity="0.9"/>
  <circle cx="225" cy="235" r="2.5" fill="#D4AF37" opacity="0.9"/>
  <circle cx="175" cy="255" r="2.5" fill="#D4AF37" opacity="0.9"/>
  <circle cx="200" cy="255" r="2.5" fill="#D4AF37" opacity="0.9"/>
  <circle cx="225" cy="255" r="2.5" fill="#D4AF37" opacity="0.9"/>
  
  <!-- Arms/Hands -->
  <!-- Right arm -->
  <ellipse cx="248" cy="220" rx="16" ry="38" fill="#F4D03F" stroke="#D4AF37" stroke-width="1"/>
  <circle cx="255" cy="250" r="12" fill="#F4D03F" stroke="#D4AF37" stroke-width="1"/>
  
  <!-- Left arm -->
  <ellipse cx="152" cy="220" rx="16" ry="38" fill="#F4D03F" stroke="#D4AF37" stroke-width="1"/>
  <circle cx="145" cy="250" r="12" fill="#F4D03F" stroke="#D4AF37" stroke-width="1"/>
  
  <!-- Hand ornaments -->
  <circle cx="258" cy="255" r="9" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="256" cy="253" r="1.5" fill="#D4AF37"/>
  
  <circle cx="142" cy="255" r="9" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="144" cy="253" r="1.5" fill="#D4AF37"/>
  
  <!-- Bottom text banner -->
  <rect x="50" y="305" width="300" height="55" rx="8" fill="#D4AF37" stroke="#B8932D" stroke-width="2"/>
  <rect x="58" y="312" width="284" height="41" rx="5" fill="#F5E6D3"/>
  
  <!-- Text -->
  <text x="200" y="330" font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4A1A5C" letter-spacing="0.5">
    Vaiyyanam
  </text>
  <text x="200" y="348" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#5C2E7E" letter-spacing="0.3">
    A Telugu way of giving
  </text>
</svg>