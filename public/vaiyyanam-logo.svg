<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Outer decorative circle -->
  <circle cx="200" cy="200" r="195" fill="#4A1A5C" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- Inner decorative circle -->
  <circle cx="200" cy="200" r="185" fill="#5C2E7E" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Decorative corner flowers -->
  <g id="flower">
    <!-- Top left flower -->
    <path d="M 50 30 Q 45 35 50 40 Q 55 35 50 30" fill="#D4AF37"/>
    <circle cx="50" cy="35" r="3" fill="#E8C547"/>
    <!-- Petals -->
    <ellipse cx="45" cy="30" rx="4" ry="6" fill="#E8C547"/>
    <ellipse cx="55" cy="30" rx="4" ry="6" fill="#E8C547"/>
    <ellipse cx="50" cy="25" rx="5" ry="5" fill="#E8C547"/>
  </g>
  
  <!-- Repeating decorative elements -->
  <use href="#flower" x="0" y="0"/>
  <use href="#flower" x="300" y="0"/>
  <use href="#flower" x="0" y="340"/>
  <use href="#flower" x="300" y="340"/>
  
  <!-- Side decorative scrolls -->
  <path d="M 30 100 Q 25 120 30 140" stroke="#D4AF37" stroke-width="2" fill="none"/>
  <path d="M 370 100 Q 375 120 370 140" stroke="#D4AF37" stroke-width="2" fill="none"/>
  <path d="M 30 260 Q 25 280 30 300" stroke="#D4AF37" stroke-width="2" fill="none"/>
  <path d="M 370 260 Q 375 280 370 300" stroke="#D4AF37" stroke-width="2" fill="none"/>
  
  <!-- Mandala background -->
  <circle cx="200" cy="200" r="130" fill="#5C2E7E" opacity="0.5"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
  
  <!-- Radial lines for mandala -->
  <g stroke="#D4AF37" stroke-width="0.5" opacity="0.4">
    <line x1="200" y1="70" x2="200" y2="330"/>
    <line x1="70" y1="200" x2="330" y2="200"/>
    <line x1="106" y1="106" x2="294" y2="294"/>
    <line x1="294" y1="106" x2="106" y2="294"/>
  </g>
  
  <!-- Ganesha silhouette (simplified elephant head) -->
  <!-- Head -->
  <ellipse cx="200" cy="150" rx="45" ry="50" fill="#E8C547"/>
  
  <!-- Ears -->
  <ellipse cx="160" cy="130" rx="25" ry="35" fill="#E8C547"/>
  <ellipse cx="240" cy="130" rx="25" ry="35" fill="#E8C547"/>
  <ellipse cx="160" cy="135" rx="15" ry="25" fill="#D4AF37"/>
  <ellipse cx="240" cy="135" rx="15" ry="25" fill="#D4AF37"/>
  
  <!-- Trunk (curved) -->
  <path d="M 200 190 Q 190 220 185 240 Q 183 250 190 255 Q 200 258 210 255 Q 217 250 215 240 Q 210 220 200 190" fill="#E8C547"/>
  
  <!-- Eyes -->
  <circle cx="185" cy="140" r="6" fill="#4A1A5C"/>
  <circle cx="215" cy="140" r="6" fill="#4A1A5C"/>
  <circle cx="187" cy="138" r="2" fill="#FFFFFF"/>
  <circle cx="217" cy="138" r="2" fill="#FFFFFF"/>
  
  <!-- Forehead mark -->
  <path d="M 200 125 L 200 115" stroke="#E81828" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="120" r="2" fill="#E81828"/>
  
  <!-- Crown/Headdress -->
  <path d="M 165 110 Q 185 85 200 75 Q 215 85 235 110" fill="#D4AF37" stroke="#C9A227" stroke-width="1"/>
  <path d="M 175 105 L 200 90 L 225 105" fill="#E8C547"/>
  
  <!-- Crown jewels -->
  <circle cx="185" cy="100" r="3" fill="#E81828"/>
  <circle cx="200" cy="88" r="4" fill="#E81828"/>
  <circle cx="215" cy="100" r="3" fill="#E81828"/>
  
  <!-- Neck ornament -->
  <ellipse cx="200" cy="195" rx="50" ry="8" fill="#D4AF37" stroke="#C9A227" stroke-width="1"/>
  <ellipse cx="200" cy="193" rx="48" ry="6" fill="#E8C547"/>
  
  <!-- Chest armor/cloth -->
  <rect x="160" y="200" width="80" height="50" rx="5" fill="#C41E3A"/>
  <rect x="165" y="205" width="70" height="40" rx="3" fill="#E81828"/>
  
  <!-- Cloth pattern -->
  <circle cx="175" cy="225" r="3" fill="#D4AF37"/>
  <circle cx="200" cy="225" r="3" fill="#D4AF37"/>
  <circle cx="225" cy="225" r="3" fill="#D4AF37"/>
  
  <!-- Arms (simplified) -->
  <!-- Right arm -->
  <ellipse cx="245" cy="215" rx="15" ry="35" fill="#E8C547"/>
  <circle cx="250" cy="245" r="10" fill="#E8C547"/>
  
  <!-- Left arm -->
  <ellipse cx="155" cy="215" rx="15" ry="35" fill="#E8C547"/>
  <circle cx="150" cy="245" r="10" fill="#E8C547"/>
  
  <!-- Hand gestures/mudras (circles) -->
  <circle cx="250" cy="250" r="8" fill="#D4AF37" stroke="#C9A227" stroke-width="1"/>
  <circle cx="150" cy="250" r="8" fill="#D4AF37" stroke="#C9A227" stroke-width="1"/>
  
  <!-- Bottom text banner -->
  <rect x="60" y="310" width="280" height="50" rx="5" fill="#D4AF37"/>
  <rect x="65" y="315" width="270" height="40" rx="3" fill="#F5E6D3"/>
  <text x="200" y="345" font-family="serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#4A1A5C">
    A Telugu way of giving love and respect
  </text>
</svg>